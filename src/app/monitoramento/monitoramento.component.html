<!-- src/app/monitoramento/monitoramento.component.html -->
<mat-card class="monitoramento-card">
  <h1 class="title">Monitoramento de Consumo/Aparelho</h1>

  <div class="controls">
    <mat-form-field appearance="fill" class="select-data">
      <mat-label>Selecionar data</mat-label>
      <mat-select [(ngModel)]="dataSelecionada" (selectionChange)="onDataChange()">
        <mat-option *ngFor="let data of datasDisponiveis" [value]="data">{{ data | date:'dd/MM/yyyy' }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-checkbox [(ngModel)]="modo30dias" (change)="onModoChange()" class="checkbox-modo">
      Modo 30 dias (média)
    </mat-checkbox>
  </div>

  <div class="chart-container">
    <h4>Consumo por Ambiente (kWh)</h4>
    <canvas baseChart
            [data]="consumoTotalPorAmbienteChartData"
            [options]="chartOptions"
            chartType="line">
    </canvas>
  </div>

  <div class="chart-container">
    <h4>Custo por Ambiente (R$)</h4>
    <canvas baseChart
            [data]="custoTotalPorAmbienteChartData"
            [options]="chartOptions"
            chartType="line">
    </canvas>
  </div>

  <div class="buttons-row">
    <button mat-stroked-button color="primary" (click)="voltar()">← Voltar para Resultados</button>
    <button mat-flat-button color="accent" (click)="gerarDicas()">Gerar dicas de economia</button>
  </div>
</mat-card>
