<mat-card class="chart-card">
  <h1 style="text-align: center;">Monitoramento de Consumo/Contador</h1>

  <mat-radio-group
    class="radio-group"
    [(ngModel)]="modo"
    (change)="onModoChange($event)"
    aria-label="Modo do gráfico"
  >
    <mat-radio-button value="mensal">Mensal</mat-radio-button>
    <mat-radio-button value="anual">Anual</mat-radio-button>
  </mat-radio-group>

  <div class="grafico-container">
    <canvas id="graficoConsumo"></canvas>
  </div>

  <div class="action-buttons">
    <button mat-stroked-button color="primary" (click)="voltar()">Voltar</button>
  </div>
</mat-card>
