<mat-card class="leitura-qr-card">
  <h2>Leitura via QR Code</h2>

  <div class="qr-container">
    <img src="qrcode.png" alt="QR Code" />
    <p>Escaneie este QR Code com outro dispositivo para abrir esta página.</p>
  </div>

  <div class="file-buttons">
    <input type="file" id="cameraInput" accept="image/*" capture="environment" (change)="onFileSelected($event)" hidden />
    <label mat-flat-button color="primary" for="cameraInput">Tirar Foto do Contador</label>

    <input type="file" id="fileInput" accept="image/*" (change)="onFileSelected($event)" hidden />
    <label mat-stroked-button color="accent" for="fileInput">Escolher Arquivo</label>
  </div>

  <div *ngIf="previewUrl" class="preview-container">
    <img [src]="previewUrl" alt="Preview da Imagem" />
  </div>

  <div class="process-button">
    <button mat-flat-button color="accent" (click)="processarOCR()" [disabled]="!imagemSelecionada">
      Processar OCR
    </button>
  </div>

  <mat-card *ngIf="valorExtraido !== null" class="resultado-ocr">
    <h4>Valor extraído pelo OCR:</h4>
    <p>{{ valorExtraido }} kWh</p>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Corrigir valor</mat-label>
      <input matInput type="number" [(ngModel)]="valorCorrigido" />
    </mat-form-field>
  </mat-card>

  <form class="selection-form" #form="ngForm" (ngSubmit)="salvarLeitura()">
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Estado</mat-label>
      <mat-select [(ngModel)]="estadoSelecionadoId" name="estado" required>
        <mat-option *ngFor="let e of estados" [value]="e.id">{{ e.nome }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Bandeira</mat-label>
      <mat-select [(ngModel)]="bandeiraSelecionadaId" name="bandeira" required>
        <mat-option *ngFor="let b of bandeiras" [value]="b.id">{{ b.cor }} - {{ b.descricao }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-checkbox [(ngModel)]="tarifaSocial" name="tarifaSocial">
      Tarifa Social
    </mat-checkbox>

    <div class="save-button">
      <button mat-raised-button color="primary" type="submit" [disabled]="!podeSalvar">Salvar Leitura</button>
    </div>
  </form>

  <mat-error *ngIf="mensagem" class="error-message">{{ mensagem }}</mat-error>
</mat-card>
